steps:
  # 1. Pull .env.production from Secret Manager to extract NEXT_PUBLIC build-time vars
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud secrets versions access latest --secret="$_SECRET_NAME" --project="$PROJECT_ID" > .env.temp

  # 2. Build the Docker image with NEXT_PUBLIC vars baked in at build time
  - name: 'gcr.io/cloud-builders/docker'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        URL=$$(grep '^NEXT_PUBLIC_SUPABASE_URL=' .env.temp | cut -d '=' -f 2- | tr -d '\r')
        KEY=$$(grep '^NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=' .env.temp | cut -d '=' -f 2- | tr -d '\r')
        SITE=$$(grep '^NEXT_PUBLIC_SITE_URL=' .env.temp | cut -d '=' -f 2- | tr -d '\r')

        docker build \
          --build-arg NEXT_PUBLIC_SUPABASE_URL="$$URL" \
          --build-arg NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY="$$KEY" \
          --build-arg NEXT_PUBLIC_SITE_URL="$$SITE" \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA \
          -t $_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:latest \
          .

  # 3. Push both tags to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME']

  # 4. Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - run
      - deploy
      - '$_SERVICE_NAME'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--project=$PROJECT_ID'
      - '--allow-unauthenticated'
      - '--service-account=$_SERVICE_ACCOUNT_NAME@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-secrets=/secrets/.env.production=$_SECRET_NAME:latest'
      - '--command=sh'
      - '--args=-c,cp /secrets/.env.production /app/.env.production && exec node server.js'
      - '--port=3000'
      - '--memory=512Mi'
      - '--cpu=1'
      - '--max-instances=3'

images:
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:$COMMIT_SHA'
  - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_ARTIFACT_REPO/$_SERVICE_NAME:latest'

options:
  logging: CLOUD_LOGGING_ONLY
